name: Sync and Convert AI Rules

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  convert-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Dependencies
        run: |
          pip install requests pyyaml

      - name: Process Rules
        run: |
          mkdir -p ruleset
          FILES=(
            "Anthropic.yaml"
            "AppleIntelligence.yaml"
            "AugmentCode.yaml"
            "Cursor.yaml"
            "Gemini.yaml"
            "Meta.yaml"
            "MixLinux.yaml"
            "OpenAI.yaml"
            "Trae.yaml"
            "Windsurf.yaml"
            "xAI.yaml"
          )
          BASE_URL="https://raw.githubusercontent.com/SkywalkerJi/Clash-Rules/master/AI"
          for FILE in "${FILES[@]}"; do
            echo "Processing: $FILE"
            curl -sL "$BASE_URL/$FILE" | \
            tr -d '\r' | \
            sed -E 's/^[[:space:]]*- //g' | \
            grep -Ev "^(payload|#|[[:space:]]*$|[[:space:]]*[\{\}\[\]])" | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "ruleset/${FILE%.yaml}.list"
          done
          
      - name: Generate SmartDNS
        run: |
          cat << 'EOF' > generate_smartdns.py
          import re
          import os
          import yaml
          import requests
          
          # ==================== 配置区域 ====================
          INI_FILE = "urltest.ini" 
          KEYWORD_MAP_FILE = "smartdns/domain_keywords_to_domain.yml"
          TARGET_KEYS = [
              "🟢 直接连接", "🚀 节点选择", "🤖 AI服务", "📈 股票相关", 
              "🌍 国际媒体", "🚄️ 国外网站", "⭐️ 海外AI", "👯‍♂️ TikTok",
              "🍎 苹果", "😊 微软", "🎁 Copilot", "🎮 Xbox", "📧 Telegram", 
              "💻 NETFLIX", "🎰 任天堂", "🎮 Steam", "🕹️ Game", "📺 emby", "📺 XPTV"
          ]
          OUTPUT_DIR = "smartdns"
          OUTPUT_FILE = "smartdns_all_domains.txt"
          # ==================================================
          
          os.makedirs(OUTPUT_DIR, exist_ok=True)
          
          # 1. 加载本地的关键字字典
          keyword_dict = {}
          if os.path.exists(KEYWORD_MAP_FILE):
              try:
                  with open(KEYWORD_MAP_FILE, 'r', encoding='utf-8') as y_f:
                      yaml_data = yaml.safe_load(y_f)
                      keyword_dict = yaml_data.get('keywords', {}) if yaml_data else {}
                  print(f"成功加载本地字典，包含 {len(keyword_dict)} 个关键字映射。")
              except Exception as e:
                  print(f"错误: 读取 YAML 字典文件失败: {e}")
                  exit(1)
          else:
              print(f"提示: 未找到字典文件 {KEYWORD_MAP_FILE}，将无法映射关键字。")
          
          if not os.path.exists(INI_FILE):
              print(f"错误: 找不到配置文件 {INI_FILE}")
              exit(1)
          
          # 2. 解析 subconverter ini (同时匹配远程 URL 和本地相对路径文件)
          pattern = re.compile(r'^\s*surge_ruleset\s*=\s*([^,]+)\s*,\s*([^\s]+)')
          rulesets = {} 
          
          with open(INI_FILE, 'r', encoding='utf-8') as f:
              for line in f:
                  match = pattern.match(line)
                  if match:
                      key = match.group(1).strip()
                      path_or_url = match.group(2).strip()
                      if key not in rulesets:
                          rulesets[key] = []
                      rulesets[key].append(path_or_url)
          
          all_domains = set()
          unmapped_keywords = {} 
          
          # 3. 获取并解析各个规则文件内容
          for key in TARGET_KEYS:
              if key not in rulesets:
                  continue
              
              for source in rulesets[key]:
                  content = ""
                  # 判断是远程 URL 还是本地文件
                  if source.startswith("http://") or source.startswith("https://"):
                      print(f"正在下载并解析 [{key}]: {source}")
                      try:
                          response = requests.get(source, timeout=30)
                          response.raise_for_status()
                          content = response.text
                      except Exception as e:
                          print(f"❌ 下载失败 {source}: {e}")
                          continue
                  else:
                      # 处理本地文件路径（例如 ruleset/OpenAI.list）
                      if os.path.exists(source):
                          print(f"正在读取本地并解析 [{key}]: {source}")
                          with open(source, 'r', encoding='utf-8') as local_f:
                              content = local_f.read()
                      else:
                          print(f"⚠️ 跳过未找到的源 [{key}]: {source}")
                          continue
          
                  for line in content.splitlines():
                      line = line.strip()
                      if not line or line.startswith("#") or line.startswith("//"):
                          continue
                      
                      parts = [p.strip() for p in line.split(',')]
                      if len(parts) < 2:
                          continue
                      
                      rule_type = parts[0].upper()
                      rule_value = parts[1]
          
                      if rule_type in ["DOMAIN", "DOMAIN-SUFFIX"]:
                          all_domains.add(rule_value.lstrip('.'))
                      
                      elif rule_type == "DOMAIN-KEYWORD":
                          kw = rule_value.lower()
                          if kw in keyword_dict and keyword_dict[kw]:
                              for mapped_domain in keyword_dict[kw]:
                                  all_domains.add(mapped_domain.lstrip('.'))
                          else:
                              if key not in unmapped_keywords:
                                  unmapped_keywords[key] = set()
                              unmapped_keywords[key].add(rule_value)
          
          # ==================== 未知关键字审计日志 ====================
          print("\n==================== ⚠️ 关键字字典审计日志 ====================")
          if unmapped_keywords:
              print("发现以下上游新增的 KEYWORD 规则未在本地 YAML 字典中定义！")
              print("这些关键字【已被跳过】，请尽快将其补充至 smartdns/domain_keywords_to_domain.yml 中:\n")
              for key, keywords in unmapped_keywords.items():
                  print(f"策略组 [{key}]:")
                  for kw in sorted(keywords):
                      print(f"  - {kw}")
                  print("")
          else:
              print("🎉 完美！所有上游规则集中的 KEYWORD 均已在本地 YAML 字典中成功映射。")
          print("==============================================================\n")
          
          # ==================== 统一写入 SmartDNS 文件 ====================
          output_path = os.path.join(OUTPUT_DIR, OUTPUT_FILE)
          with open(output_path, 'w', encoding='utf-8') as out_f:
              for domain in sorted(all_domains):
                  out_f.write(f"{domain}\n")
          
          print(f"🎉 成功！所有合并去重后的域名（含映射域名）共计 {len(all_domains)} 个。")
          print(f"已保存至: {output_path}")
          EOF
          python generate_smartdns.py
          
      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 1. 强删临时脚本
          rm -f generate_smartdns.py
          
          # 2. 将生成的 txt 以及第一步转换的本地规则一同加入暂存区
          git add smartdns/smartdns_all_domains.txt
          if [ -d "ruleset" ]; then
            git add ruleset/*.list
          fi
          
          # 3. 精准判断提交
          if ! git diff --cached --quiet; then
            git commit -m "Update merged SmartDNS rules and local lists: $(date +%Y-%m-%d)"
            git push
          else
            echo "🎉 所有规则文件均无变化，跳过本次 Commit。"
          fi
