name: Sync and Convert AI Rules

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  convert-rules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Process Rules
        run: |
          mkdir -p rules
          FILES=(
            "Anthropic.yaml"
            "AppleIntelligence.yaml"
            "AugmentCode.yaml"
            "Cursor.yaml"
            "Gemini.yaml"
            "Meta.yaml"
            "MixLinux.yaml"
            "OpenAI.yaml"
            "Trae.yaml"
            "Windsurf.yaml"
          )
          BASE_URL="https://raw.githubusercontent.com/SkywalkerJi/Clash-Rules/master/AI"
          for FILE in "${FILES[@]}"; do
            echo "Processing: $FILE"
            curl -sL "$BASE_URL/$FILE" | \
            tr -d '\r' | \
            sed -E 's/^[[:space:]]*- //g' | \
            grep -Ev "^(payload|#|[[:space:]]*$|[[:space:]]*[\{\}\[\]])" | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' > "ruleset/${FILE%.yaml}.list"
          done

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ruleset/*.list
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update AI rules: $(date +%Y-%m-%d)"
            git push
          else
            echo "No changes detected, skipping."
          fi
