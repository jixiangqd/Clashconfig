- name: Run Parsers and Generator
        run: |
          cat << 'EOF' > generate_smartdns.py
          import re
          import os
          import requests

          # ==================== 配置区域 ====================
          INI_FILE = "urltest.ini" 
          TARGET_KEYS = ["🟢 直接连接", "🚀 节点选择", "🤖 AI服务"]
          OUTPUT_DIR = "smartdns"
          # ==================================================

          os.makedirs(OUTPUT_DIR, exist_ok=True)

          if not os.path.exists(INI_FILE):
              print(f"错误: 找不到配置文件 {INI_FILE}")
              exit(1)

          pattern = re.compile(r'^\s*surge_ruleset\s*=\s*([^,]+)\s*,\s*(http[s]?://[^\s]+)')

          rulesets = {}
          with open(INI_FILE, 'r', encoding='utf-8') as f:
              for line in f:
                  match = pattern.match(line)
                  if match:
                      key = match.group(1).strip()
                      url = match.group(2).strip()
                      rulesets[key] = url

          print(f"从 ini 中成功解析出 {len(rulesets)} 条 surge_ruleset 配置。\n")

          for key in TARGET_KEYS:
              if key not in rulesets:
                  print(f"提示: 指定的 Key '{key}' 在 ini 中未找到，跳过。")
                  continue
              
              url = rulesets[key]
              print(f"==================================================")
              print(f"正在处理策略组: {key}")
              print(f"下载规则 URL: {url}")
              
              try:
                  response = requests.get(url, timeout=30)
                  response.raise_for_status()
                  content = response.text
              except Exception as e:
                  print(f"下载失败 {url}: {e}")
                  continue

              domains = set()
              keywords_found = []

              for line in content.splitlines():
                  line = line.strip()
                  if not line or line.startswith("#") or line.startswith("//"):
                      continue
                  
                  parts = [p.strip() for p in line.split(',')]
                  if len(parts) < 2:
                      continue
                  
                  rule_type = parts[0].upper()
                  rule_value = parts[1]

                  # 1. 纯域名和后缀域名直接计入 Domain-Set
                  if rule_type in ["DOMAIN", "DOMAIN-SUFFIX"]:
                      clean_domain = rule_value.lstrip('.')
                      domains.add(clean_domain)
                  
                  # 2. 发现 KEYWORD 规则时，不写入文件，仅记录到本地变量用于打印日志
                  elif rule_type == "DOMAIN-KEYWORD":
                      keywords_found.append(rule_value)

              # 打印 KEYWORD 发现日志
              if keywords_found:
                  print(f"\n⚠️ 警告: 在 [{key}] 中发现 {len(keywords_found)} 个 DOMAIN-KEYWORD 规则(已跳过写入txt):")
                  for kw in sorted(set(keywords_found)):
                      print(f"   - {kw}")
                  print("") # 留空行
              else:
                  print(f"  (该规则集中未包含 DOMAIN-KEYWORD 规则)")

              # 写入纯文本域名列表 (仅包含合法的 DOMAIN / DOMAIN-SUFFIX)
              safe_filename = re.sub(r'[^\w\-_]', '_', key).strip('_') + ".txt"
              output_path = os.path.join(OUTPUT_DIR, safe_filename)
              
              with open(output_path, 'w', encoding='utf-8') as out_f:
                  for domain in sorted(domains):
                      out_f.write(f"{domain}\n")
              
              print(f"成功生成纯域名列表: {output_path}，包含 {len(domains)} 个合法域名。")
              print(f"==================================================\n")

          EOF
          python generate_smartdns.py
